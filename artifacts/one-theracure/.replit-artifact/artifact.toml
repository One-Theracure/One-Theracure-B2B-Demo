kind = "web"
previewPath = "/"
title = "One TheraCure"
version = "1.0.0"
id = "artifacts/one-theracure"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19536

[services.development]
run = "pnpm --filter @workspace/one-theracure run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/one-theracure", "run", "build" ]
publicDir = "artifacts/one-theracure/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19536"
BASE_PATH = "/"
